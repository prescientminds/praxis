<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 80px 24px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 60px;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }
        a.project {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            background: #111;
            text-decoration: none;
            color: #e0e0e0;
            transition: background 0.15s;
        }
        a.project:hover {
            background: #1a1a1a;
        }
        .project-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .project-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
        }
        .project-desc {
            font-size: 0.85rem;
            color: #666;
        }
        .project-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-live { background: #1a2e1a; color: #4ade80; }
        .tag-external { background: #1a1a2e; color: #818cf8; }
        .arrow {
            color: #444;
            margin-left: 16px;
            font-size: 1.2rem;
            transition: color 0.15s;
        }
        a.project:hover .arrow { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vibecode</h1>
        <p class="subtitle">Small tools, built fast.</p>
        <div class="projects">
            <a class="project" href="./la-happy-hours/">
                <div class="project-info">
                    <span class="project-name">Pour — LA Happy Hours</span>
                    <span class="project-desc">146 restaurants, 200 deals, 42 neighborhoods</span>
                </div>
                <div style="display:flex;align-items:center;">
                    <span class="project-tag tag-live">Live</span>
                    <span class="arrow">&rarr;</span>
                </div>
            </a>
            <a class="project" href="https://basketball-trade-mapper.vercel.app" target="_blank" rel="noopener">
                <div class="project-info">
                    <span class="project-name">NBA Trade Mapper</span>
                    <span class="project-desc">Visual trade trees, salary pipelines, playoff game logs</span>
                </div>
                <div style="display:flex;align-items:center;">
                    <span class="project-tag tag-external">Vercel</span>
                    <span class="arrow">&rarr;</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
