<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praxis.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #1F1346;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 80px 24px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        /* --- Mark --- */
        .mark {
            display: flex;
            align-items: baseline;
            gap: 0;
            margin-bottom: 48px;
        }
        .mark-text {
            font-family: 'Inter', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #673de6, #8c85ff, #673de6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s ease-in-out infinite;
        }
        .mark-dot {
            font-size: 2.4rem;
            font-weight: 600;
            color: #673de6;
            animation: pulse 3s ease-in-out infinite;
        }
        .mark-sub {
            display: block;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 0.06em;
            margin-top: 6px;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- Projects --- */
        .projects {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #2f1c6a;
            border-radius: 12px;
            overflow: hidden;
        }
        a.project {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            background: #251a54;
            text-decoration: none;
            color: #e0e0e0;
            transition: background 0.2s, padding-left 0.2s;
        }
        a.project:hover {
            background: #2f1c6a;
            padding-left: 34px;
        }
        .project-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .project-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: #fff;
        }
        .project-desc {
            font-size: 0.82rem;
            color: #555;
        }
        .project-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .project-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .tag-live { background: rgba(103,61,230,0.15); color: #8c85ff; }
        .tag-external { background: rgba(140,133,255,0.1); color: #8c85ff; }
        .arrow {
            color: #333;
            font-size: 1.1rem;
            transition: color 0.2s, transform 0.2s;
        }
        a.project:hover .arrow {
            color: #8c85ff;
            transform: translateX(3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mark">
            <div>
                <span class="mark-text">praxis</span><span class="mark-dot">.</span>
                <span class="mark-sub">where ideas take form</span>
            </div>
        </div>
        <div class="projects">
            <a class="project" href="./la-happy-hours/">
                <div class="project-info">
                    <span class="project-name">Happy List LA</span>
                    <span class="project-desc">Authoritative Guide to LA's Happy Hour Scene</span>
                </div>
                <div class="project-right">
                    <span class="project-tag tag-live">Live</span>
                    <span class="arrow">&rarr;</span>
                </div>
            </a>
            <a class="project" href="https://basketball-trade-mapper.vercel.app" target="_blank" rel="noopener">
                <div class="project-info">
                    <span class="project-name">NBA Trade Mapper</span>
                    <span class="project-desc">Visual trade trees, salary pipelines, playoff game logs</span>
                </div>
                <div class="project-right">
                    <span class="project-tag tag-external">Vercel</span>
                    <span class="arrow">&rarr;</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
